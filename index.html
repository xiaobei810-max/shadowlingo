<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ShadowLingo</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #22c55e;
  --bg: #080d14;
  --card: #0d1520;
  --border: #1a2540;
  --text: #e2e8f0;
  --muted: #4b5563;
}
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans SC', sans-serif; min-height: 100vh; display: flex; justify-content: center; }
.app { width: 100%; max-width: 480px; padding-bottom: 40px; }

/* Header */
.header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 12px; }
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon { width: 38px; height: 38px; background: var(--green); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
.logo-text { font-weight: 700; font-size: 18px; }
.logo-sub { font-size: 11px; color: var(--muted); }
.counter { font-size: 14px; color: var(--muted); }

/* Progress bar */
.prog-bar { height: 3px; background: var(--border); margin: 0 20px 16px; border-radius: 99px; }
.prog-fill { height: 100%; background: var(--green); border-radius: 99px; transition: width 0.4s ease; width: 0%; }

/* Scene */
.scene {
  margin: 0 16px 14px;
  border-radius: 20px;
  min-height: 300px;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  background: radial-gradient(ellipse at 30% 40%, #0d2a4a 0%, #080d14 60%),
              radial-gradient(ellipse at 70% 60%, #1a0a2e 0%, transparent 50%);
  border: 1px solid var(--border);
  padding: 20px 16px;
}
.scene-top { display: flex; justify-content: space-between; align-items: center; width: 100%; position: absolute; top: 12px; left: 0; padding: 0 14px; }
.label { font-size: 11px; color: var(--muted); background: rgba(255,255,255,0.06); padding: 4px 10px; border-radius: 20px; }
.status { font-size: 11px; color: var(--green); }

/* Mascot */
.mascot-wrap { position: relative; width: 140px; height: 140px; }
.mascot-img { width: 140px; height: 140px; object-fit: contain; mix-blend-mode: multiply; transition: transform 0.15s; }
.mascot-ring { position: absolute; inset: -8px; border-radius: 50%; border: 3px solid var(--green); opacity: 0; transition: opacity 0.3s; }

/* Karaoke text */
.kara-wrap { text-align: center; padding: 0 8px; min-height: 52px; display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 1px; }
.kc { font-family: 'Noto Serif SC', serif; font-size: 30px; font-weight: 700; color: #4b5563; position: relative; transition: color 0.05s; }
.kc.done { color: var(--green); }
.kc.active { color: var(--green); }

/* Info card */
.info-card { background: rgba(13,21,32,0.85); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; margin: 0 16px 10px; }
.pinyin { font-size: 14px; color: #60a5fa; margin-bottom: 4px; letter-spacing: 0.02em; }
.eng { font-size: 13px; color: var(--muted); }

/* Tabs */
.tabs { display: flex; border-bottom: 1px solid var(--border); margin: 0 16px 12px; }
.tab { flex: 1; text-align: center; padding: 8px 4px; font-size: 11px; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
.tab.active { color: var(--green); border-bottom-color: var(--green); }

/* Score card */
.score-card { display: none; margin: 0 16px 12px; background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; flex-direction: row; align-items: center; gap: 16px; }
.score-card.show { display: flex; }
.score-ring { position: relative; width: 72px; height: 72px; flex-shrink: 0; }
.score-ring svg { transform: rotate(-90deg); }
.score-num { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; color: var(--green); }
.score-text { flex: 1; }
.score-praise { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.score-hint { font-size: 12px; color: var(--muted); line-height: 1.5; }

/* Buttons */
.btn-area { display: flex; flex-direction: column; gap: 8px; margin: 0 16px; }
.btn {
  width: 100%; padding: 14px 16px; border-radius: 14px;
  border: 1px solid var(--border); background: var(--card);
  color: var(--text); font-size: 14px; font-family: inherit;
  cursor: pointer; transition: all 0.2s; text-align: center;
}
.btn:hover:not(:disabled) { border-color: var(--green); background: rgba(34,197,94,0.08); }
.btn:disabled { opacity: 0.35; cursor: default; }
.btn.active { border-color: var(--green); background: rgba(34,197,94,0.12); color: var(--green); }
.btn-nav { display: flex; gap: 8px; }
.btn-nav .btn { flex: 1; }
.btn-done { background: var(--green); color: #000; font-weight: 700; border-color: var(--green); display: none; }
.btn-done.show { display: block; }
.btn-done:hover { background: #16a34a; }

@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }
@keyframes glow { 0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0.5)} 50%{box-shadow:0 0 14px 4px rgba(34,197,94,0.25)} }
</style>
</head>

  }
}

function buildKara(text) {
  const el = document.getElementById("kara");
  el.innerHTML = "";
  if (!text) return;
  [...text].forEach(c => {
    const span = document.createElement("span");
    span.className = "kc";
    span.textContent = c;
    el.appendChild(span);
  });
}

function completeKara() {
  document.querySelectorAll(".kc").forEach(c => {
    c.classList.remove("active");
    c.classList.add("done");
  });
}

function setStatus(txt) {
  document.getElementById("status").textContent = txt;
}

function updateUI() {
  const s = SENTENCES[idx];
  document.getElementById("counter").textContent = (idx+1) + " / " + SENTENCES.length;
  document.getElementById("lbl").textContent = "第 " + (idx+1) + "/" + SENTENCES.length + " 句";
  document.getElementById("prog").style.width = ((idx / SENTENCES.length) * 100) + "%";
  document.getElementById("pinyin").textContent = s.pinyin;
  document.getElementById("eng").textContent = s.en;

  const bl = document.getElementById("bl");
  const bs = document.getElementById("bs");
  const bn = document.getElementById("bn");
  const bdone = document.getElementById("bdone");
  const bback = document.getElementById("bback");

  bs.disabled = (phase === "idle");
  bn.disabled = (phase === "idle" || phase === "listening");
  bback.disabled = (idx === 0);

  bl.className = "btn" + (phase === "listening" ? " active" : "");
  bs.className = "btn" + (phase === "slow" ? " active" : "");
  bn.className = "btn" + (phase === "normal" ? " active" : "");
  bdone.className = "btn btn-done" + (phase === "scored" ? " show" : "");

  const tabs = ["t0","t1","t2","t3"];
  const tabPhase = {idle:0, listening:0, slow:1, normal:2, scored:3};
  const cur = tabPhase[phase] || 0;
  tabs.forEach((id,i) => {
    document.getElementById(id).className = "tab" + (i === cur ? " active" : "");
  });

  buildKara(s.zh);
  document.getElementById("score-card").classList.remove("show");
}

function playSegment(start, end, rate, onEnd) {
  clearTimeout(segTimer);
  audio.playbackRate = rate;
  audio.currentTime = start;
  audio.play().catch(() => {});
  speak(true);
  const dur = ((end - start) / rate) * 1000;
  const fill = document.getElementById("bar-fill");
  segTimer = setTimeout(function() {
    audio.pause();
    speak(false);
    completeKara();
    if (onEnd) onEnd();
  }, dur + 100);
}

async function startRec(dur, onDone) {
  hasRecorded = false;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    hasRecorded = true;
    const mr = new MediaRecorder(stream);
    mr.start();
    setTimeout(function() {
      mr.stop();
      stream.getTracks().forEach(t => t.stop());
      onDone();
    }, dur);
  } catch(e) {
    hasRecorded = false;
    showNoMic();
  }
}

function showNoMic() {
  phase = "scored";
  updateUI();
  document.getElementById("praise").textContent = "🎙 需要麦克风权限 Mic needed";
  document.getElementById("hint").textContent = "请在浏览器地址栏允许麦克风 / Allow mic in browser settings";
  document.getElementById("sn").textContent = "-";
  document.getElementById("sc").setAttribute("stroke-dasharray", "0 188");
  document.getElementById("score-card").classList.add("show");
}

function showScore() {
  if (!hasRecorded) { showNoMic(); return; }
  phase = "scored";
  updateUI();
  const s = randScore();
  const fb = FEEDBACK[idx] || FEEDBACK[0];
  const circ = 2 * Math.PI * 30;
  const dash = (s / 100) * circ;
  const color = s >= 85 ? "#22c55e" : s >= 70 ? "#facc15" : "#f87171";
  const sc = document.getElementById("sc");
  sc.setAttribute("stroke", color);
  setTimeout(function() {
    sc.setAttribute("stroke-dasharray", dash + " " + circ);
  }, 100);
  document.getElementById("sn").textContent = s;
  document.getElementById("sn").style.color = color;
  document.getElementById("praise").textContent = fb.praise + "  " + getPraise(s);
  document.getElementById("hint").textContent = fb.hint;
  document.getElementById("score-card").classList.add("show");
}

function doListen() {
  clearTimeout(segTimer); audio.pause(); speak(false);
  phase = "listening"; setStatus("🎧 播放中..."); updateUI();
  const s = SENTENCES[idx];
  playSegment(s.start, s.end, 1, function() {
    phase = "listened"; setStatus("准备好了"); updateUI();
  });
}

function doSlow() {
  if (phase === "idle") return;
  clearTimeout(segTimer); audio.pause(); speak(false);
  phase = "slow"; setStatus("🐢 慢速跟读..."); updateUI();
  const s = SENTENCES[idx];
  const dur = ((s.end - s.start) / 0.65) * 1000;
  playSegment(s.start, s.end, 0.65, function() { setStatus("🎙 录音中..."); });
  startRec(dur + 500, function() {
    phase = "slowed"; setStatus("录音完成"); showScore();
  });
}

function doNormal() {
  if (phase === "idle" || phase === "listening") return;
  clearTimeout(segTimer); audio.pause(); speak(false);
  phase = "normal"; setStatus("🚀 常速跟读..."); updateUI();
  const s = SENTENCES[idx];
  const dur = (s.end - s.start) * 1000;
  playSegment(s.start, s.end, 1, function() { setStatus("🎙 录音中..."); });
  startRec(dur + 500, function() {
    phase = "normal_done"; setStatus("录音完成"); showScore();
  });
}

function doBack() {
  if (idx === 0) return;
  clearTimeout(segTimer); audio.pause(); speak(false);
  idx--;
  phase = "idle";
  setStatus("准备好了");
  updateUI();
}

function doNext() {
  clearTimeout(segTimer); audio.pause(); speak(false);
  if (idx >= SENTENCES.length - 1) {
    alert("🎉 恭喜完成本课！Congratulations!");
    return;
  }
  idx++;
  phase = "idle";
  setStatus("准备好了");
  updateUI();
}

// Karaoke timeupdate sync
const RATE_OFFSET = { fast: 0.15, slow: 0.3 };
audio.addEventListener("timeupdate", function() {
  const s = SENTENCES[idx];
  if (!s || audio.paused) return;
  const offset = audio.playbackRate < 0.8 ? RATE_OFFSET.slow : RATE_OFFSET.fast;
  const elapsed = audio.currentTime - s.start - offset;
  const dur = s.end - s.start;
  if (elapsed < 0) return;
  const progress = Math.min(elapsed / dur, 1);
  const chars = document.querySelectorAll(".kc");
  if (!chars.length) return;
  const charProgress = progress * chars.length;
  const curIdx = Math.floor(charProgress);
  chars.forEach(function(c, i) {
    if (c.classList.contains("done")) return;
    if (i < curIdx) {
      c.classList.remove("active");
      c.classList.add("done");
    } else if (i === curIdx) {
      c.classList.add("active");
    }
  });
});

audio.addEventListener("seeking", function() {
  document.querySelectorAll(".kc").forEach(function(c) {
    c.classList.remove("done","active");
  });
});

// Init
updateUI();
</script>
