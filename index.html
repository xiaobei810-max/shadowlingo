<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ShadowLingo</title>
<style>
:root {
  --bg: #0a0f1a;
  --card: #111827;
  --border: #1a2540;
  --green: #22c55e;
  --muted: #4b5563;
  --text: #e2e8f0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; min-height: 100vh; display: flex; justify-content: center; }
.app { width: 100%; max-width: 480px; padding: 0 0 32px; }

/* Header */
.header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 0; }
.logo { display: flex; align-items: center; gap: 12px; }
.logo-icon { width: 44px; height: 44px; background: var(--green); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 800; color: #000; }
.logo-text { font-size: 20px; font-weight: 700; color: var(--text); }
.logo-sub { font-size: 14px; color: #94a3b8; font-weight: 500; letter-spacing: 0.05em; }
.header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.counter { font-size: 15px; color: var(--muted); font-weight: 600; }
.practice-count { font-size: 11px; color: #4b5563; }

/* Progress bar */
.progress-bar { height: 3px; background: var(--border); margin: 12px 0 0; }
.progress-fill { height: 100%; background: var(--green); transition: width 0.4s ease; }

/* Lesson selector */
.lesson-nav { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 10px 20px 0; }
.lesson-nav button { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 4px 8px; border-radius: 8px; }
.lesson-nav button:hover:not(:disabled) { color: var(--green); }
.lesson-nav button:disabled { opacity: 0.2; cursor: default; }
.lesson-title-text { font-size: 13px; color: #94a3b8; font-weight: 600; }

/* Audio error */
.audio-error { display: none; background: rgba(248,113,113,0.1); border: 1px solid #f87171; border-radius: 12px; padding: 10px 14px; margin: 10px 20px 0; font-size: 13px; color: #f87171; text-align: center; }
.audio-error.show { display: block; }

/* Stage card */
.stage { background: var(--card); border-radius: 20px; margin: 10px 20px 0; overflow: hidden; position: relative; }
.mascot-wrap { display: flex; justify-content: center; align-items: flex-end; padding: 20px 20px 0; height: 190px; }
.mascot-img { width: 160px; height: 190px; object-fit: contain; mix-blend-mode: screen; transition: transform 0.15s; }
.mascot-ring { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 176px; height: 206px; border-radius: 50%; border: 3px solid var(--green); opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.sentence-badge { position: absolute; top: 14px; left: 14px; background: rgba(0,0,0,0.5); border-radius: 99px; padding: 4px 12px; font-size: 12px; color: var(--muted); }
.status-badge { position: absolute; top: 14px; right: 14px; font-size: 13px; color: var(--green); font-weight: 600; }
.sentence-box { padding: 20px 20px 24px; text-align: center; }

/* Countdown overlay */

/* Karaoke text */
.kara-wrap { font-size: 28px; font-weight: 700; line-height: 1.4; margin-bottom: 12px; display: flex; flex-wrap: wrap; justify-content: center; gap: 2px; }
.kchar { color: #4b5563; transition: color 0.1s; }
.kchar.active { color: var(--text); }
.kchar.done { color: var(--green); }

/* Karaoke progress bar */
.kara-bar { height: 3px; background: var(--border); border-radius: 99px; margin: 0 0 12px; overflow: hidden; }
.kara-bar-fill { height: 100%; background: var(--green); width: 0%; }

.info-box { background: #0a1120; border-radius: 14px; padding: 14px 16px; text-align: left; }
.pinyin { font-size: 14px; color: #60a5fa; margin-bottom: 4px; letter-spacing: 0.02em; }
.en { font-size: 13px; color: var(--muted); }

/* Speed control */
.speed-control { display: flex; align-items: center; gap: 10px; padding: 12px 20px 0; }
.speed-control span { font-size: 12px; color: var(--muted); white-space: nowrap; }
.speed-control input[type=range] { flex: 1; accent-color: var(--green); cursor: pointer; }
.speed-label { font-size: 12px; color: var(--green); font-weight: 600; min-width: 36px; text-align: right; }

/* Status + speech indicator */
.status-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 20px 0; }
.status-text { font-size: 13px; color: var(--muted); }
.speech-indicator { font-size: 12px; color: #f87171; font-weight: 600; display: none; }
.speech-indicator.active { display: block; animation: blink 1s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* Score panel */
.score-panel { background: var(--card); border-radius: 20px; margin: 12px 20px 0; padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
.score-top { display: flex; align-items: center; gap: 14px; }
.score-num { font-size: 36px; font-weight: 800; color: var(--green); min-width: 52px; text-align: center; }
.score-right { flex: 1; }
.score-praise { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.score-hint { font-size: 12px; color: var(--muted); line-height: 1.5; }
.score-transcript { font-size: 12px; color: #60a5fa; background: rgba(96,165,250,0.08); border-radius: 8px; padding: 8px 10px; line-height: 1.6; border-left: 2px solid #60a5fa; }
.score-transcript .label { font-weight: 600; color: #94a3b8; }

/* Buttons */
.controls { padding: 0 20px; margin-top: 12px; display: flex; flex-direction: column; gap: 10px; }
.btn { width: 100%; padding: 16px; background: var(--card); border: 1.5px solid var(--border); border-radius: 16px; color: var(--text); font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn:hover:not(:disabled) { border-color: var(--green); background: rgba(34,197,94,0.08); }
.btn:disabled { opacity: 0.35; cursor: default; }
.btn.active { border-color: var(--green); background: rgba(34,197,94,0.12); color: var(--green); }
.btn-nav { display: flex; gap: 8px; }
.btn-nav .btn { flex: 1; }
.btn-done { background: var(--green); color: #000; font-weight: 700; border-color: var(--green); display: none; }
.btn-done.show { display: block; }
.btn-done:hover:not(:disabled) { background: #16a34a; }
.btn-retry { background: rgba(251,191,36,0.1); border-color: #d97706; color: #fbbf24; display: none; }
.btn-retry.show { display: block; }
.btn-retry:hover:not(:disabled) { background: rgba(251,191,36,0.18); border-color: #fbbf24; }

@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }
@keyframes glow { 0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0.5)} 50%{box-shadow:0 0 14px 4px rgba(34,197,94,0.25)} }

/* Completion overlay */
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.88); z-index:999; flex-direction:column; align-items:center; justify-content:center; padding:24px; }
.overlay.show { display:flex; }
.completion-card { background:#0d1520; border:1px solid #22c55e; border-radius:24px; padding:28px 24px; max-width:400px; width:100%; text-align:center; position:relative; z-index:2; }
.completion-title { font-size:28px; font-weight:700; color:#22c55e; margin-bottom:6px; }
.completion-sub { font-size:14px; color:#94a3b8; margin-bottom:20px; }
.avg-score { font-size:64px; font-weight:800; color:#22c55e; line-height:1; margin-bottom:4px; }
.avg-label { font-size:12px; color:#4b5563; margin-bottom:12px; }
.score-grade { font-size:18px; font-weight:600; margin-bottom:16px; }
.praise-block { margin-top: 12px; }
.btn-restart { margin-top:16px; width:100%; padding:14px; background:#22c55e; color:#000; font-weight:700; font-size:15px; border:none; border-radius:14px; cursor:pointer; }
.btn-restart:hover { background:#16a34a; }

/* Annotation panel */
.annotation-panel { border-radius: 12px; padding: 10px 0 2px; }
.anno-legend { font-size: 11px; margin-bottom: 8px; display: flex; gap: 12px; }
.anno-legend span { display: flex; align-items: center; gap: 4px; }
.anno-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.anno-dot.correct { background: #22c55e; }
.anno-dot.confused { background: #fbbf24; }
.anno-dot.miss { background: #f87171; }
.anno-chars { font-size: 26px; font-weight: 700; letter-spacing: 4px; margin-bottom: 8px; line-height: 1.5; }
.anno-char { display: inline-block; border-radius: 4px; padding: 0 1px; }
.anno-char.correct { color: #22c55e; }
.anno-char.confused { color: #fbbf24; border-bottom: 2px solid #fbbf24; }
.anno-char.miss { color: #f87171; border-bottom: 2px solid #f87171; text-decoration-line: underline; text-decoration-style: wavy; }
.anno-rec { font-size: 12px; color: #94a3b8; margin-top: 4px; }

/* ── 评价页面 ─────────────────────────────── */
.eval-page {
  display: none; position: fixed; inset: 0; z-index: 600;
  background: var(--bg); overflow-y: auto;
  flex-direction: column; align-items: center;
  padding: 24px 20px 48px;
}
.eval-page.show { display: flex; }
.eval-inner { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 14px; }

/* 顶部句子信息 */
.eval-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.eval-badge { background: rgba(255,255,255,0.06); border-radius: 99px; padding: 4px 14px; font-size: 12px; color: var(--muted); }

.eval-sentence-card { background: var(--card); border-radius: 20px; padding: 20px 20px 16px; text-align: center; }
.eval-zh { font-size: 26px; font-weight: 700; color: var(--text); line-height: 1.4; margin-bottom: 8px; }
.eval-pinyin { font-size: 13px; color: #60a5fa; letter-spacing: 0.03em; }
.eval-en { font-size: 12px; color: var(--muted); margin-top: 4px; }

/* 分数卡片 */
.eval-score-card { background: var(--card); border-radius: 20px; padding: 24px 20px; text-align: center; }
.eval-score-num { font-size: 80px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
.eval-score-sub { font-size: 13px; color: var(--muted); margin-bottom: 10px; }
.eval-grade { font-size: 18px; font-weight: 700; }
.eval-praise { font-size: 14px; color: #94a3b8; margin-top: 10px; line-height: 1.8; padding: 0 8px; white-space: pre-line; }

/* 发音对比卡片 */
.eval-compare-card { background: var(--card); border-radius: 20px; padding: 18px 20px; }
.eval-compare-title { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; }
.eval-compare-row { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
.eval-compare-row:last-child { margin-bottom: 0; }
.eval-tag { font-size: 11px; color: var(--muted); background: rgba(255,255,255,0.06); border-radius: 6px; padding: 2px 8px; white-space: nowrap; margin-top: 4px; }
.eval-anno-wrap { font-size: 24px; font-weight: 700; letter-spacing: 3px; line-height: 1.5; flex: 1; }
.eval-rec-text { font-size: 16px; color: #94a3b8; flex: 1; line-height: 1.6; padding-top: 2px; }

/* 发音提示 */
.eval-hint-card { background: rgba(96,165,250,0.07); border: 1px solid rgba(96,165,250,0.2); border-radius: 20px; padding: 16px 20px; }
.eval-hint-title { font-size: 12px; font-weight: 700; color: #60a5fa; margin-bottom: 8px; }
.eval-hint-text { font-size: 14px; color: #94a3b8; line-height: 1.6; }

/* 底部导航 */
.eval-nav { display: flex; gap: 12px; margin-top: 4px; }
.eval-nav .btn { flex: 1; padding: 16px; }
.eval-btn-next { background: var(--green); color: #000; font-weight: 700; border-color: var(--green); }
.eval-btn-next:hover:not(:disabled) { background: #16a34a; border-color: #16a34a; }

/* Fireworks */
#fw-canvas { position:fixed; inset:0; z-index:1000; pointer-events:none; }
</style>
</head>
<body>
<canvas id="fw-canvas"></canvas>

<div class="app">
  <div class="header">
    <div class="logo">
      <div class="logo-icon">影</div>
      <div>
        <div class="logo-text">ShadowLingo</div>
        <div class="logo-sub">轻松学中文</div>
      </div>
    </div>
    <div class="header-right">
      <div class="counter" id="counter">1 / 5</div>
      <div class="practice-count" id="practice-count"></div>
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>

  <div class="lesson-nav">
    <button id="btn-lesson-prev" onclick="changeLesson(-1)" disabled>‹</button>
    <span class="lesson-title-text" id="lesson-title-text"></span>
    <button id="btn-lesson-next" onclick="changeLesson(1)">›</button>
  </div>

  <div class="audio-error" id="audio-error">⚠️ 音频加载失败，请检查网络后刷新重试</div>

  <div class="stage">
    <div class="mascot-wrap">
      <img class="mascot-img" id="mascot" src="mascot.jpg" alt="mascot" onerror="this.style.display='none'"/>
      <div class="mascot-ring" id="ring"></div>
    </div>
    <div class="sentence-badge" id="badge">第 1/5 句</div>


    <div class="sentence-box">
      <div class="kara-wrap" id="kara"></div>
      <div class="kara-bar"><div class="kara-bar-fill" id="bar-fill"></div></div>
      <div class="info-box">
        <div class="pinyin" id="pinyin"></div>
        <div class="en" id="en"></div>
      </div>
    </div>
  </div>

  <div class="speed-control">
    <span>慢速</span>
    <input type="range" id="speed-slider" min="0.5" max="1.0" step="0.05" value="0.7"
      oninput="onSpeedChange(this.value)"/>
    <span class="speed-label" id="speed-label">0.7×</span>
  </div>

  <div class="status-row">
    <span class="status-text" id="status-text">准备好了 Ready</span>
    <span class="speech-indicator" id="speech-indicator">🎙 聆听中...</span>
  </div>


  <div class="controls">
    <button class="btn" id="bl" onclick="doListen()">▶ 听原声 Listen</button>
    <button class="btn" id="bs" onclick="doSlow()" disabled>🐢 慢速跟读 Slow Shadow</button>
    <button class="btn" id="bm" onclick="doNormal()">🚀 常速跟读 Shadow</button>
    <button class="btn" id="bn" onclick="doRecord()">🎤 录音 Record</button>
    <button class="btn btn-retry" id="bretry" onclick="doRetry()">↩ 再练一次 Retry</button>
    <div class="btn-nav">
      <button class="btn" id="bprev" onclick="doPrev()" disabled>◀ 上一句</button>
      <button class="btn btn-done" id="bdone" onclick="doNext()">下一句 ▶</button>
    </div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="completion-card">
    <div class="completion-title">🎉 本课完成！</div>
    <div class="completion-sub">Lesson Complete!</div>
    <div class="avg-score" id="avg-score">--</div>
    <div class="avg-label">本课平均分</div>
    <div class="score-grade" id="score-grade"></div>
    <div class="praise-block" id="praise-block"></div>
    <button class="btn-restart" onclick="restartLesson()">再练一次 Practice Again</button>
  </div>
</div>

<script>
// ── Data ─────────────────────────────────────────────────
const LESSONS = [
  {
    id: "lesson-1",
    title: "第一课：打招呼",
    audio: "https://raw.githubusercontent.com/xiaobei810-max/shadowlingo-videos2/main/%E6%96%B0%E5%BD%95%E9%9F%B3%209.m4a",
    sentences: [
      {
        zh: "你好，很高兴认识你！",
        pinyin: "Nǐ hǎo, hěn gāo xìng rèn shi nǐ!",
        en: "Hello, nice to meet you!",
        start: 1, end: 4.5,
        praise: "✨ 声调很自然！Tones sounded natural!",
        hint: "注意【高兴】是第四声+轻声 · Watch the tones in 【高兴】"
      },
      {
        zh: "我是一个中国人，你也想成为一个中国人吗？",
        pinyin: "Wǒ shì yī gè Zhōng guó rén, nǐ yě xiǎng chéng wéi yī gè Zhōng guó rén ma?",
        en: "I'm Chinese - do you want to become one too?",
        start: 5, end: 10.5,
        praise: "💪 语速控制得好！Great rhythm control!",
        hint: "【中国人】连读时注意【国】字轻读 · Keep 【国】light in 【中国人】"
      },
      {
        zh: "首先，你得学会中文。",
        pinyin: "Shǒu xiān, nǐ děi xué huì Zhōng wén.",
        en: "First of all, you need to learn Chinese.",
        start: 11, end: 14.5,
        praise: "🎯 短句说得很干净！Clean and clear!",
        hint: "【首先】三声+一声，注意不要把三声说成四声 · In 【首先】, tone 3 before tone 1"
      },
      {
        zh: "每天我会用一个轻松有趣的小故事来教你怎么说中文。",
        pinyin: "Měi tiān wǒ huì yòng yī gè qīng sōng yǒu qù de xiǎo gù shi lái jiāo nǐ zěn me shuō Zhōng wén.",
        en: "Every day I'll use a fun little story to teach you how to speak Chinese.",
        start: 14.5, end: 22.5,
        praise: "🔥 长句挑战完成！Long sentence nailed!",
        hint: "长句可分两段断气，会更自然 · Try pausing mid-sentence to keep breath steady"
      },
      {
        zh: "赶快行动起来吧，和我一起轻松学中文！",
        pinyin: "Gǎn kuài xíng dòng qǐ lái ba, hé wǒ yī qǐ qīng sōng xué Zhōng wén!",
        en: "Take action now - let's learn Chinese together, the easy way!",
        start: 22.5, end: 28.5,
        praise: "🌟 收尾句气势很足！Strong finish!",
        hint: "【赶快】要连读成一个词，中间不要停顿 · Blend 【赶快】into one smooth word"
      }
    ]
  }
  // 更多课时在此扩展：
  // { id: "lesson-2", title: "第二课：...", audio: "...", sentences: [...] }
];

const PRAISES = [
  { min: 90, msgs: ["🏆 完美！声调拿捏精准！Perfect tones!", "🌟 太棒了，说得非常地道！So natural!"] },
  { min: 75, msgs: ["🔥 非常好，再练一遍就完美！Almost perfect!", "💪 发音很稳，越来越自然了！Getting smoother!"] },
  { min: 60, msgs: ["👏 不错，节奏感已经到位了！Good rhythm!", "💡 有进步，多听几遍能做到！Keep it up!"] },
  { min: 0,  msgs: ["🌱 开口就是最大的勇气！Brave start!", "💫 每次练习都是进步！Every rep counts!"] }
];

// ── State ─────────────────────────────────────────────────
let lessonIdx = 0;
let idx = 0;
let phase = "idle"; // idle | listen | slow | countdown | recording | scored
let busy = false;
let segTimer = null;
let sessionScores = [];
let slowSpeed = 0.7;

// ── Storage ───────────────────────────────────────────────
function loadState() {
  try {
    const raw = localStorage.getItem("sl_state");
    if (!raw) return;
    const s = JSON.parse(raw);
    if (typeof s.lessonIdx === "number" && s.lessonIdx < LESSONS.length) lessonIdx = s.lessonIdx;
    if (typeof s.sentenceIdx === "number" && s.sentenceIdx < LESSONS[lessonIdx].sentences.length) idx = s.sentenceIdx;
    if (typeof s.slowSpeed === "number") {
      slowSpeed = s.slowSpeed;
      const slider = document.getElementById("speed-slider");
      if (slider) slider.value = slowSpeed;
      const lbl = document.getElementById("speed-label");
      if (lbl) lbl.textContent = fmtSpeed(slowSpeed);
    }
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem("sl_state", JSON.stringify({ lessonIdx, sentenceIdx: idx, slowSpeed }));
  } catch(e) {}
}

function getPracticeCount(lIdx, sIdx) {
  try { return parseInt(localStorage.getItem("sl_count_" + lIdx + "_" + sIdx) || "0", 10); }
  catch(e) { return 0; }
}

function incPracticeCount(lIdx, sIdx) {
  try { localStorage.setItem("sl_count_" + lIdx + "_" + sIdx, getPracticeCount(lIdx, sIdx) + 1); }
  catch(e) {}
}

function fmtSpeed(v) {
  return parseFloat(v).toFixed(2).replace(/0+$/, "").replace(/\.$/, "") + "×";
}

// ── Audio setup ───────────────────────────────────────────
let audio = null;

function setupAudio(src) {
  if (audio) { audio.pause(); audio.removeEventListener("timeupdate", onTimeUpdate); audio.src = ""; }
  audio = new Audio(src);
  audio.preload = "auto";
  audio.addEventListener("error", function() {
    document.getElementById("audio-error").classList.add("show");
    setStatus("⚠️ 音频加载失败");
    busy = false;
  });
  audio.addEventListener("canplaythrough", function() {
    document.getElementById("audio-error").classList.remove("show");
  });
  audio.addEventListener("timeupdate", onTimeUpdate);
}

// ── Speech Recognition ────────────────────────────────────
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let recognizedText = "";
let recTimeout = null;

if (SpeechRecognition) {
  recognition = new SpeechRecognition();
  recognition.lang = "zh-CN";
  recognition.continuous = true;
  recognition.interimResults = false;
  recognition.maxAlternatives = 3;

  recognition.onresult = function(e) {
    // Accumulate all results as user speaks
    var transcript = "";
    for (var i = 0; i < e.results.length; i++) {
      transcript += e.results[i][0].transcript;
    }
    recognizedText = transcript;
  };

  recognition.onerror = function() {
    // Ignore errors — user will submit manually
  };

  recognition.onend = function() {
    if (phase === "recording") finishRecording();
  };
}

// ── 拼音工具 & 高级评分 ─────────────────────────────────
var TONE_MARKS = {
  'ā':'a','á':'a','ǎ':'a','à':'a',
  'ē':'e','é':'e','ě':'e','è':'e',
  'ī':'i','í':'i','ǐ':'i','ì':'i',
  'ō':'o','ó':'o','ǒ':'o','ò':'o',
  'ū':'u','ú':'u','ǔ':'u','ù':'u',
  'ǖ':'v','ǘ':'v','ǚ':'v','ǜ':'v'
};

var charPinyinMap = {}; // char → tone-stripped pinyin，从课程数据构建

function buildCharPinyinMap(lesson) {
  var map = {};
  lesson.sentences.forEach(function(s) {
    var chars = Array.from(s.zh).filter(function(c) { return /[\u4e00-\u9fff]/.test(c); });
    var sylls = parseSyllables(s.pinyin);
    chars.forEach(function(c, i) {
      if (sylls[i] && !map[c]) map[c] = stripTones(sylls[i]);
    });
  });
  return map;
}

function parseSyllables(pinyin) {
  return pinyin.replace(/[,，。！？.!?]/g, ' ').trim().split(/\s+/).filter(Boolean);
}

function stripTones(p) {
  var r = p.toLowerCase();
  Object.keys(TONE_MARKS).forEach(function(k) { r = r.split(k).join(TONE_MARKS[k]); });
  return r;
}

// 判断两个去声调拼音是否属于常见易混淆对
function isConfusedPinyin(p1, p2) {
  if (!p1 || !p2 || p1 === p2) return false;
  var confusions = [
    // 翘舌/平舌
    ['zh','z'], ['ch','c'], ['sh','s'],
    // 前后鼻音
    ['ang','an'], ['eng','en'], ['ing','in'],
    ['iang','ian'], ['uang','uan'], ['ong','on'],
  ];
  for (var i = 0; i < confusions.length; i++) {
    var a = confusions[i][0], b = confusions[i][1];
    // 声母混淆：zh/z, ch/c, sh/s
    if (p1.slice(0, a.length) === a && p2.slice(0, b.length) === b &&
        p1.slice(a.length) === p2.slice(b.length)) return true;
    if (p1.slice(0, b.length) === b && p2.slice(0, a.length) === a &&
        p1.slice(b.length) === p2.slice(a.length)) return true;
    // 韵母混淆：an/ang, en/eng, in/ing
    if (p1.slice(-a.length) === a && p2.slice(-b.length) === b &&
        p1.slice(0, -a.length) === p2.slice(0, -b.length)) return true;
    if (p1.slice(-b.length) === b && p2.slice(-a.length) === a &&
        p1.slice(0, -b.length) === p2.slice(0, -a.length)) return true;
  }
  // n/l 声母混淆
  if (p1[0] === 'n' && p2[0] === 'l' && p1.slice(1) === p2.slice(1)) return true;
  if (p1[0] === 'l' && p2[0] === 'n' && p1.slice(1) === p2.slice(1)) return true;
  return false;
}

// LCS 对齐：将 recognized 中能匹配 expected 的字符对齐，其余为 miss
function lcsAlign(exp, rec) {
  var n = exp.length, m = rec.length;
  var dp = [];
  for (var i = 0; i <= n; i++) { dp[i] = []; for (var j = 0; j <= m; j++) dp[i][j] = 0; }
  for (var i = 1; i <= n; i++)
    for (var j = 1; j <= m; j++)
      dp[i][j] = exp[i-1] === rec[j-1] ? dp[i-1][j-1]+1 : Math.max(dp[i-1][j], dp[i][j-1]);
  var result = [], i = n, j = m;
  while (i > 0 || j > 0) {
    if (i > 0 && j > 0 && exp[i-1] === rec[j-1]) {
      result.unshift({ exp: exp[i-1], rec: rec[j-1], match: 'exact' }); i--; j--;
    } else if (j > 0 && (i === 0 || dp[i][j-1] >= dp[i-1][j])) {
      j--; // 多余的识别字，忽略
    } else {
      result.unshift({ exp: exp[i-1], rec: null, match: 'miss' }); i--;
    }
  }
  return result;
}

// 高级评分：字符级匹配 + 易混淆音部分扣分
function calcAdvancedScore(recognized, sentence) {
  var isZh = function(c) { return /[\u4e00-\u9fff]/.test(c); };
  var expArr = Array.from(sentence.zh).filter(isZh);
  var recArr = Array.from(recognized).filter(isZh);

  if (!recArr.length) {
    return { score: 0, annotations: expArr.map(function(c) { return { char: c, type: 'miss' }; }) };
  }

  var aligned = lcsAlign(expArr, recArr);
  var n = expArr.length;
  var deductFull = 70 / n;     // 完全错误：最多扣到30分
  var deductConfused = 35 / n; // 易混淆音：扣一半
  var deduction = 0;
  var annotations = [];

  aligned.forEach(function(item) {
    if (item.match === 'exact') {
      annotations.push({ char: item.exp, type: 'correct' });
    } else {
      // 检查是否有易混淆发音出现在识别文本中
      var expP = charPinyinMap[item.exp] || '';
      var confused = false;
      if (expP) {
        for (var ri = 0; ri < recArr.length; ri++) {
          var recP = charPinyinMap[recArr[ri]] || '';
          if (recP && isConfusedPinyin(expP, recP)) { confused = true; break; }
        }
      }
      if (confused) {
        annotations.push({ char: item.exp, type: 'confused' });
        deduction += deductConfused;
      } else {
        annotations.push({ char: item.exp, type: 'miss' });
        deduction += deductFull;
      }
    }
  });

  return { score: Math.max(30, Math.round(100 - deduction)), annotations: annotations };
}

function getPraise(s) {
  var b = PRAISES.find(function(p) { return s >= p.min; });
  return b ? b.msgs[Math.floor(Math.random() * b.msgs.length)] : "";
}

// ── Karaoke engine ────────────────────────────────────────
var charTimingsCache = [];
var karaStart = 0, karaEnd = 0, karaActive = false;

function computeCharTimings(sentence) {
  var duration = sentence.end - sentence.start;
  var chars = Array.from(sentence.zh);

  var syllables = sentence.pinyin
    .replace(/[āáǎàēéěèīíǐìōóǒòūúǔùǖǘǚǜ]/g, "a")
    .replace(/[,，。！？.!?]/g, " ")
    .trim().split(/\s+/).filter(function(s) { return s.length > 0; });

  var weights = [];
  var sIdx = 0;
  for (var i = 0; i < chars.length; i++) {
    if (/[\u4e00-\u9fff]/.test(chars[i])) {
      weights.push(Math.max((syllables[sIdx] || "aa").length, 1));
      sIdx++;
    }
  }
  var totalWeight = weights.reduce(function(a, b) { return a + b; }, 0) || 1;

  var timings = [];
  var wIdx = 0;
  var elapsed = 0;
  for (var i = 0; i < chars.length; i++) {
    if (/[\u4e00-\u9fff]/.test(chars[i])) {
      var w = weights[wIdx++] || 2;
      var dur = (w / totalWeight) * duration;
      timings.push({ start: elapsed, end: elapsed + dur });
      elapsed += dur;
    } else {
      timings.push({ start: elapsed, end: elapsed + 0.05 });
    }
  }
  return timings;
}

function buildKara(text) {
  var el = document.getElementById("kara");
  el.innerHTML = "";
  Array.from(text).forEach(function(c) {
    var span = document.createElement("span");
    span.className = "kchar";
    span.textContent = c;
    el.appendChild(span);
  });
}

function startKaraSync(segStart, segEnd, timings) {
  karaStart = segStart;
  karaEnd = segEnd;
  charTimingsCache = timings;
  karaActive = true;
  document.getElementById("bar-fill").style.width = "0%";
}

function onTimeUpdate() {
  if (!karaActive || !audio) return;
  var elapsed = audio.currentTime - karaStart;
  var duration = karaEnd - karaStart;
  var pct = Math.max(0, Math.min(1, elapsed / duration));
  document.getElementById("bar-fill").style.width = (pct * 100) + "%";
  var chars = document.querySelectorAll(".kchar");
  chars.forEach(function(el, i) {
    var t = charTimingsCache[i];
    if (!t) return;
    if (elapsed >= t.end) { el.className = "kchar done"; }
    else if (elapsed >= t.start) { el.className = "kchar active"; }
    else { el.className = "kchar"; }
  });
}

function completeKara() {
  karaActive = false;
  document.querySelectorAll(".kchar").forEach(function(c) { c.className = "kchar done"; });
  document.getElementById("bar-fill").style.width = "100%";
}

function resetKara() {
  karaActive = false;
  document.querySelectorAll(".kchar").forEach(function(c) { c.className = "kchar"; });
  document.getElementById("bar-fill").style.width = "0%";
}

// ── Helpers ───────────────────────────────────────────────
function setStatus(t) {
  var el = document.getElementById("status-text");
  if (el) el.textContent = t;
}

function clearTimers() {
  if (segTimer) { clearTimeout(segTimer); segTimer = null; }
  if (recTimeout) { clearTimeout(recTimeout); recTimeout = null; }
}

function speak(on) {
  var ring = document.getElementById("ring");
  var mascot = document.getElementById("mascot");
  if (on) {
    ring.style.opacity = "1";
    ring.style.animation = "glow 1.2s ease-in-out infinite";
    mascot.style.animation = "pulse 0.4s ease-in-out infinite alternate";
  } else {
    ring.style.opacity = "0";
    ring.style.animation = "";
    mascot.style.animation = "";
  }
}

function onSpeedChange(val) {
  slowSpeed = parseFloat(val);
  document.getElementById("speed-label").textContent = fmtSpeed(slowSpeed);
  saveState();
}

function changeLesson(dir) {
  var next = lessonIdx + dir;
  if (next < 0 || next >= LESSONS.length) return;
  lessonIdx = next;
  idx = 0;
  sessionScores = [];
  charPinyinMap = buildCharPinyinMap(LESSONS[lessonIdx]);
  setupAudio(LESSONS[lessonIdx].audio);
  updateUI();
  saveState();
}

// ── UI Update ─────────────────────────────────────────────
function updateUI() {
  clearTimers();
  if (audio) { audio.pause(); audio.playbackRate = 1; }
  speak(false);
  busy = false;
  phase = "idle";

  var lesson = LESSONS[lessonIdx];
  var s = lesson.sentences[idx];
  var total = lesson.sentences.length;

  document.getElementById("lesson-title-text").textContent = lesson.title;
  document.getElementById("btn-lesson-prev").disabled = lessonIdx === 0;
  document.getElementById("btn-lesson-next").disabled = lessonIdx === LESSONS.length - 1;

  buildKara(s.zh);
  resetKara();
  document.getElementById("pinyin").textContent = s.pinyin;
  document.getElementById("en").textContent = s.en;
  document.getElementById("badge").textContent = "第 " + (idx + 1) + "/" + total + " 句";
  document.getElementById("counter").textContent = (idx + 1) + " / " + total;
  document.getElementById("progress").style.width = ((idx + 1) / total * 100) + "%";

  var cnt = getPracticeCount(lessonIdx, idx);
  document.getElementById("practice-count").textContent = cnt > 0 ? "已练 " + cnt + " 次" : "";

  document.getElementById("eval-page").classList.remove("show");
  document.getElementById("speech-indicator").classList.remove("active");
  document.getElementById("bn").textContent = "🎤 录音 Record";

  document.getElementById("bl").disabled = false;
  document.getElementById("bl").classList.remove("active");
  document.getElementById("bs").disabled = false;
  document.getElementById("bs").classList.remove("active");
  document.getElementById("bm").classList.remove("active");
  document.getElementById("bn").disabled = false;
  document.getElementById("bn").classList.remove("active");
  document.getElementById("bprev").disabled = idx === 0;
  document.getElementById("bdone").className = "btn btn-done show";
  document.getElementById("bretry").className = "btn btn-retry";

  setStatus("准备好了 Ready");
  saveState();
}

// ── Actions ───────────────────────────────────────────────
function doListen() {
  if (recognition) { try { recognition.abort(); } catch(e) {} }
  clearTimers();
  busy = true;
  phase = "listen";

  var s = LESSONS[lessonIdx].sentences[idx];
  var timings = computeCharTimings(s);
  var dur = (s.end - s.start) * 1000;

  setStatus("▶ 听原声 Listening...");
  document.getElementById("bl").classList.add("active");

  audio.currentTime = s.start;
  audio.playbackRate = 1;
  audio.play();
  speak(true);
  resetKara();
  startKaraSync(s.start, s.end, timings);

  segTimer = setTimeout(function() {
    audio.pause();
    speak(false);
    completeKara();
    document.getElementById("bl").classList.remove("active");
    setStatus("准备好了 Ready");
    busy = false;
    phase = "idle";
  }, dur + 200);
}

function doSlow() {
  if (recognition) { try { recognition.abort(); } catch(e) {} }
  clearTimers();
  busy = true;
  phase = "slow";

  var s = LESSONS[lessonIdx].sentences[idx];
  var timings = computeCharTimings(s);
  var dur = (s.end - s.start) / slowSpeed * 1000;

  setStatus("🐢 慢速跟读 Shadow (slow)...");
  document.getElementById("bs").classList.add("active");

  audio.currentTime = s.start;
  audio.playbackRate = slowSpeed;
  audio.play();
  speak(true);
  resetKara();
  startKaraSync(s.start, s.end, timings);

  segTimer = setTimeout(function() {
    audio.pause();
    audio.playbackRate = 1;
    speak(false);
    completeKara();
    document.getElementById("bs").classList.remove("active");
    setStatus("准备好了 Ready");
    busy = false;
    phase = "idle";
  }, dur + 200);
}

function doNormal() {
  if (recognition) { try { recognition.abort(); } catch(e) {} }
  clearTimers();
  busy = true;
  phase = "normal";

  var s = LESSONS[lessonIdx].sentences[idx];
  var timings = computeCharTimings(s);
  var dur = (s.end - s.start) * 1000;

  setStatus("🚀 常速跟读 Shadow...");
  document.getElementById("bm").classList.add("active");

  audio.currentTime = s.start;
  audio.playbackRate = 1;
  audio.play();
  speak(true);
  resetKara();
  startKaraSync(s.start, s.end, timings);

  segTimer = setTimeout(function() {
    audio.pause();
    speak(false);
    completeKara();
    document.getElementById("bm").classList.remove("active");
    setStatus("准备好了 Ready");
    busy = false;
    phase = "idle";
  }, dur + 200);
}

function doRecord() {
  if (phase === "recording") {
    stopRecording();
  } else {
    startRecording();
  }
}

function startRecording() {
  if (recognition) { try { recognition.abort(); } catch(e) {} }
  clearTimers();
  if (audio) { audio.pause(); speak(false); }
  phase = "recording";
  recognizedText = "";
  busy = true;
  document.getElementById("bn").textContent = "⏹ 停止录音 Stop";
  document.getElementById("bn").classList.add("active");
  document.getElementById("speech-indicator").classList.add("active");
  resetKara();
  setStatus("🎙 录音中 Recording...");
  if (recognition) {
    try { recognition.start(); } catch(e) {}
  }
}

function stopRecording() {
  document.getElementById("bn").textContent = "🎤 录音 Record";
  document.getElementById("bn").classList.remove("active");
  if (recognition) {
    try { recognition.stop(); } catch(e) { finishRecording(); }
  } else {
    finishRecording();
  }
}

function finishRecording() {
  if (phase !== "recording") return;
  clearTimers();
  phase = "scored";
  busy = false;

  document.getElementById("speech-indicator").classList.remove("active");
  document.getElementById("bn").textContent = "🎤 录音 Record";
  document.getElementById("bn").classList.remove("active");
  completeKara();

  var s = LESSONS[lessonIdx].sentences[idx];
  var result;
  if (recognizedText && recognition) {
    result = calcAdvancedScore(recognizedText, s);
  } else if (recognition) {
    result = { score: 65, annotations: null };
  } else {
    result = { score: Math.floor(Math.random() * 14) + 82, annotations: null };
  }

  sessionScores.push(result.score);
  incPracticeCount(lessonIdx, idx);
  document.getElementById("practice-count").textContent = "已练 " + getPracticeCount(lessonIdx, idx) + " 次";

  showEvalPage(result.score, s, result.annotations, recognizedText);
}

function showEvalPage(score, sentence, annotations, recognized) {
  var total = LESSONS[lessonIdx].sentences.length;
  var color = score >= 85 ? "#22c55e" : score >= 70 ? "#facc15" : "#f87171";

  // 句子信息
  document.getElementById("eval-badge").textContent = "第 " + (idx+1) + "/" + total + " 句";
  document.getElementById("eval-zh").textContent = sentence.zh;
  document.getElementById("eval-pinyin").textContent = sentence.pinyin;
  document.getElementById("eval-en").textContent = sentence.en;

  // 分数
  var numEl = document.getElementById("eval-score-num");
  numEl.textContent = score;
  numEl.style.color = color;
  var grade = score >= 90 ? "🏆 优秀 Excellent"
            : score >= 80 ? "🌟 良好 Great"
            : score >= 70 ? "💪 一般 Good" : "🌱 继续加油 Keep Going";
  var gradeEl = document.getElementById("eval-grade");
  gradeEl.textContent = grade;
  gradeEl.style.color = color;
  document.getElementById("eval-praise").textContent = sentence.praise + "\n" + getPraise(score);

  // 发音对比
  var compareCard = document.getElementById("eval-compare-card");
  if (annotations && annotations.length) {
    var html = annotations.map(function(a) {
      return '<span class="anno-char ' + a.type + '">' + a.char + '</span>';
    }).join('');
    document.getElementById("eval-anno-chars").innerHTML = html;
    document.getElementById("eval-rec-text").textContent = recognized || "（未识别到语音）";
    compareCard.style.display = "block";
  } else {
    compareCard.style.display = "none";
  }

  // 发音提示
  var hint = sentence.hint;
  if (!recognition) hint += "  （💡开启麦克风权限可获精准评分）";
  document.getElementById("eval-hint-text").textContent = hint;

  // 导航按钮状态
  document.getElementById("eval-prev").disabled = idx === 0;
  var isLast = idx >= LESSONS[lessonIdx].sentences.length - 1;
  document.getElementById("eval-next").textContent = isLast ? "完成本课 🎉" : "下一句 ▶";

  document.getElementById("eval-page").classList.add("show");
  document.getElementById("eval-page").scrollTop = 0;
}

function evalNav(dir) {
  document.getElementById("eval-page").classList.remove("show");
  if (dir === 1) {
    var lesson = LESSONS[lessonIdx];
    if (idx >= lesson.sentences.length - 1) { showCompletion(); return; }
    idx++;
  } else {
    if (idx > 0) idx--;
  }
  updateUI();
}


function doRetry() {
  if (recognition) { try { recognition.abort(); } catch(e) {} }
  clearTimers();
  // Remove the last score so the retry score replaces it
  if (sessionScores.length > 0) sessionScores.pop();
  updateUI();
}

function doPrev() {
  if (recognition) { try { recognition.abort(); } catch(e) {} }
  if (idx > 0) { idx--; updateUI(); }
}

function doNext() {
  if (recognition) { try { recognition.abort(); } catch(e) {} }
  clearTimers();
  if (audio) audio.pause();
  speak(false);
  var lesson = LESSONS[lessonIdx];
  if (idx >= lesson.sentences.length - 1) {
    showCompletion();
    return;
  }
  idx++;
  updateUI();
}

function showCompletion() {
  var overall = sessionScores.length
    ? Math.round(sessionScores.reduce(function(a, b) { return a + b; }, 0) / sessionScores.length)
    : 75;
  var oColor = overall >= 85 ? "#22c55e" : overall >= 70 ? "#facc15" : "#f87171";

  document.getElementById("avg-score").textContent = overall;
  document.getElementById("avg-score").style.color = oColor;

  var grade = overall >= 90 ? "🏆 优秀 Excellent" :
              overall >= 80 ? "🌟 良好 Great" :
              overall >= 70 ? "💪 一般 Good" : "🌱 继续加油 Keep Going";
  document.getElementById("score-grade").textContent = grade;
  document.getElementById("score-grade").style.color = oColor;

  var best = PRAISES.find(function(p) { return overall >= p.min; });
  var praiseMsg = best ? best.msgs[Math.floor(Math.random() * best.msgs.length)] : "";
  var lastS = LESSONS[lessonIdx].sentences[idx];
  document.getElementById("praise-block").innerHTML =
    "<div style='font-size:15px;font-weight:600;margin-bottom:8px;'>" + praiseMsg + "</div>" +
    "<div style='font-size:13px;color:#94a3b8;'>" + lastS.hint + "</div>";

  document.getElementById("overlay").classList.add("show");
  launchFireworks();
}

function restartLesson() {
  document.getElementById("overlay").classList.remove("show");
  stopFireworks();
  idx = 0;
  sessionScores = [];
  updateUI();
}

// ── Fireworks ─────────────────────────────────────────────
var fwCanvas = document.getElementById("fw-canvas");
var fwCtx = fwCanvas.getContext("2d");
var fwParticles = [], fwAnimId = null, fwStopTimer = null;
var FW_COLORS = ["#22c55e","#60a5fa","#fbbf24","#f87171","#a78bfa","#fb923c"];

function resizeFW() { fwCanvas.width = window.innerWidth; fwCanvas.height = window.innerHeight; }
window.addEventListener("resize", resizeFW); resizeFW();

function burst(x, y) {
  var color = FW_COLORS[Math.floor(Math.random() * FW_COLORS.length)];
  for (var i = 0; i < 60; i++) {
    var angle = (Math.PI * 2 / 60) * i;
    var speed = 2 + Math.random() * 5;
    fwParticles.push({ x: x, y: y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, alpha: 1, color: color, r: 2+Math.random()*2 });
  }
}

function animateFW() {
  fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
  fwParticles.forEach(function(p) {
    p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.alpha -= 0.015;
    fwCtx.globalAlpha = Math.max(0, p.alpha);
    fwCtx.fillStyle = p.color;
    fwCtx.beginPath();
    fwCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    fwCtx.fill();
  });
  fwCtx.globalAlpha = 1;
  fwParticles = fwParticles.filter(function(p) { return p.alpha > 0; });
  fwAnimId = requestAnimationFrame(animateFW);
}

function launchFireworks() {
  fwParticles = [];
  if (fwAnimId) cancelAnimationFrame(fwAnimId);
  if (fwStopTimer) clearTimeout(fwStopTimer);
  animateFW();
  var count = 0;
  function fire() {
    burst(Math.random()*window.innerWidth, Math.random()*window.innerHeight*0.6);
    count++;
    if (count < 12) setTimeout(fire, 400);
  }
  fire();
  fwStopTimer = setTimeout(stopFireworks, 5000);
}

function stopFireworks() {
  if (fwAnimId) { cancelAnimationFrame(fwAnimId); fwAnimId = null; }
  fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
  fwParticles = [];
}

// ── Init ──────────────────────────────────────────────────
loadState();
charPinyinMap = buildCharPinyinMap(LESSONS[lessonIdx]);
setupAudio(LESSONS[lessonIdx].audio);
