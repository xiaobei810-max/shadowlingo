<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ShadowLingo</title>
<style>
:root {
  --bg: #0a0f1a;
  --card: #111827;
  --border: #1a2540;
  --green: #22c55e;
  --muted: #4b5563;
  --text: #e2e8f0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; min-height: 100vh; display: flex; justify-content: center; }
.app { width: 100%; max-width: 480px; padding: 0 0 32px; }

/* Header */
.header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 0; }
.logo { display: flex; align-items: center; gap: 12px; }
.logo-icon { width: 44px; height: 44px; background: var(--green); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 800; color: #000; }
.logo-text { font-size: 20px; font-weight: 700; color: var(--text); }
.logo-sub { font-size: 14px; color: #94a3b8; font-weight: 500; letter-spacing: 0.05em; }
.counter { font-size: 15px; color: var(--muted); font-weight: 600; }

/* Progress bar */
.progress-bar { height: 3px; background: var(--border); margin: 12px 0 0; }
.progress-fill { height: 100%; background: var(--green); transition: width 0.4s ease; }

/* Stage card */
.stage { background: var(--card); border-radius: 20px; margin: 16px 20px 0; overflow: hidden; position: relative; }
.mascot-wrap { display: flex; justify-content: center; align-items: flex-end; padding: 20px 20px 0; height: 190px; }
.mascot-img { width: 160px; height: 190px; object-fit: contain; mix-blend-mode: screen; }
.sentence-badge { position: absolute; top: 14px; left: 14px; background: rgba(0,0,0,0.5); border-radius: 99px; padding: 4px 12px; font-size: 12px; color: var(--muted); }
.status-badge { position: absolute; top: 14px; right: 14px; font-size: 13px; color: var(--green); font-weight: 600; }
.sentence-box { padding: 20px 20px 24px; text-align: center; }
.sentence-zh { font-size: 28px; font-weight: 700; color: var(--text); line-height: 1.4; margin-bottom: 12px; }
.info-box { background: #0a1120; border-radius: 14px; padding: 14px 16px; text-align: left; }
.pinyin { font-size: 14px; color: #60a5fa; margin-bottom: 4px; letter-spacing: 0.02em; }
.en { font-size: 13px; color: var(--muted); }

/* Score panel */
.score-panel { background: var(--card); border-radius: 20px; margin: 12px 20px 0; padding: 14px 16px; display: flex; align-items: center; gap: 14px; }
.score-num { font-size: 36px; font-weight: 800; color: var(--green); min-width: 52px; text-align: center; }
.score-right { flex: 1; }
.score-praise { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.score-hint { font-size: 12px; color: var(--muted); line-height: 1.5; }

/* Buttons */
.controls { padding: 0 20px; margin-top: 12px; display: flex; flex-direction: column; gap: 10px; }
.btn-row { display: flex; gap: 10px; }
.btn { width: 100%; padding: 16px; background: var(--card); border: 1.5px solid var(--border); border-radius: 16px; color: var(--text); font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn:hover:not(:disabled) { border-color: var(--green); background: rgba(34,197,94,0.08); }
.btn:disabled { opacity: 0.35; cursor: default; }
.btn.active { border-color: var(--green); background: rgba(34,197,94,0.12); color: var(--green); }
.btn-nav { display: flex; gap: 8px; }
.btn-nav .btn { flex: 1; }
.btn-done { background: var(--green); color: #000; font-weight: 700; border-color: var(--green); display: none; }
.btn-done.show { display: block; }
.btn-done:hover { background: #16a34a; }

@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }
@keyframes glow { 0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0.5)} 50%{box-shadow:0 0 14px 4px rgba(34,197,94,0.25)} }

/* Completion overlay */
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.88); z-index:999; flex-direction:column; align-items:center; justify-content:center; padding:24px; }
.overlay.show { display:flex; }
.completion-card { background:#0d1520; border:1px solid #22c55e; border-radius:24px; padding:28px 24px; max-width:400px; width:100%; text-align:center; position:relative; z-index:2; }
.completion-title { font-size:28px; font-weight:700; color:#22c55e; margin-bottom:6px; }
.completion-sub { font-size:14px; color:#94a3b8; margin-bottom:20px; }
.avg-score { font-size:64px; font-weight:800; color:#22c55e; line-height:1; margin-bottom:4px; }
.avg-label { font-size:12px; color:#4b5563; margin-bottom:12px; }
.score-grade { font-size:18px; font-weight:600; margin-bottom:16px; }
.btn-restart { margin-top:16px; width:100%; padding:14px; background:#22c55e; color:#000; font-weight:700; font-size:15px; border:none; border-radius:14px; cursor:pointer; }
.btn-restart:hover { background:#16a34a; }

/* Fireworks */
#fw-canvas { position:fixed; inset:0; z-index:1000; pointer-events:none; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">
      <div class="logo-icon">影</div>
      <div>
        <div class="logo-text">ShadowLingo</div>
        <div class="logo-sub">轻松学中文</div>
      </div>
    </div>
    <div class="counter" id="counter">1 / 5</div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>

  <div class="stage">
    <div class="mascot-wrap">
      <img class="mascot-img" src="https://raw.githubusercontent.com/xiaobei810-max/shadowlingo/main/OIG3_munWfA_ym-removebg-preview.png" alt="mascot"/>
    </div>
    <div class="sentence-badge" id="badge">第 1/5 句</div>
    <div class="status-badge" id="status">准备好了 Ready</div>
    <div class="sentence-box">
      <div class="sentence-zh" id="zh"></div>
      <div class="info-box">
        <div class="pinyin" id="pinyin"></div>
        <div class="en" id="en"></div>
      </div>
    </div>
  </div>

  <div class="score-panel" id="score-panel" style="display:none;">
    <div class="score-num" id="score-num">-</div>
    <div class="score-right">
      <div class="score-praise" id="praise"></div>
      <div class="score-hint" id="hint"></div>
    </div>
  </div>

  <div class="controls">
    <div class="btn-nav">
      <button class="btn" id="bprev" onclick="doPrev()">← Prev · 上一句</button>
      <button class="btn" id="bnext" onclick="doNext()">下一句 Next →</button>
    </div>
    <button class="btn" id="bl" onclick="doListen()">🎧 Step 1 · 听原声 Listen</button>
    <button class="btn" id="bs" onclick="doSlow()" disabled>🐢 Step 2 · 慢速跟读 Slow</button>
    <button class="btn" id="bn" onclick="doNormal()" disabled>🚀 Step 3 · 常速跟读 Normal</button>
    <button class="btn btn-done" id="bdone" onclick="doNext()">✅ 完成本句 · 下一句 Next →</button>
  </div>
</div>

<canvas id="fw-canvas"></canvas>
<div class="overlay" id="overlay">
  <div class="completion-card">
    <div class="completion-title">🎉 课程完成！</div>
    <div class="completion-sub">Lesson Complete · Great work!</div>
    <div class="avg-score" id="avg-score">-</div>
    <div class="avg-label">综合评分 Overall Score</div>
    <div class="score-grade" id="score-grade"></div>
    <div id="praise-block" style="margin:12px 0;font-size:14px;color:#e2e8f0;line-height:1.6;"></div>
    <button class="btn-restart" onclick="restartLesson()">🔄 再练一遍 Practice Again</button>
  </div>
</div>

<script>
const AUDIO_SRC = "https://raw.githubusercontent.com/xiaobei810-max/shadowlingo-videos2/main/%E6%96%B0%E5%BD%95%E9%9F%B3%209.m4a";

const SENTENCES = [
  { zh:"你好，很高兴认识你！", pinyin:"Nǐ hǎo, hěn gāo xìng rèn shi nǐ!", en:"Hello, nice to meet you!", start:1, end:4.5 },
  { zh:"我是一个中国人，你也想成为一个中国人吗？", pinyin:"Wǒ shì yī gè Zhōng guó rén, nǐ yě xiǎng chéng wéi yī gè Zhōng guó rén ma?", en:"I'm Chinese - do you want to become one too?", start:5, end:10.5 },
  { zh:"首先，你得学会中文。", pinyin:"Shǒu xiān, nǐ děi xué huì Zhōng wén.", en:"First of all, you need to learn Chinese.", start:11, end:14.5 },
  { zh:"每天我会用一个轻松有趣的小故事来教你怎么说中文。", pinyin:"Měi tiān wǒ huì yòng yī gè qīng sōng yǒu qù de xiǎo gù shi lái jiāo nǐ zěn me shuō Zhōng wén.", en:"Every day I'll use a fun little story to teach you how to speak Chinese.", start:14.5, end:22.5 },
  { zh:"赶快行动起来吧，和我一起轻松学中文！", pinyin:"Gǎn kuài xíng dòng qǐ lái ba, hé wǒ yī qǐ qīng sōng xué Zhōng wén!", en:"Take action now - let's learn Chinese together, the easy way!", start:22.5, end:28.5 }
];

const FEEDBACK = [
  { praise:"✨ 声调很自然！Tones sounded natural!", hint:"注意【高兴】是第四声+轻声 · Watch the tones in 【高兴】" },
  { praise:"💪 语速控制得好！Great rhythm control!", hint:"【中国人】连读时注意【国】字轻读 · Keep 【国】light in 【中国人】" },
  { praise:"🎯 短句说得很干净！Clean and clear!", hint:"【首先】三声+一声，注意不要把三声说成四声 · In 【首先】, tone 3 before tone 1" },
  { praise:"🔥 长句挑战完成！Long sentence nailed!", hint:"长句可分两段断气，会更自然 · Try pausing mid-sentence to keep breath steady" },
  { praise:"🌟 收尾句气势很足！Strong finish!", hint:"【赶快】要连读成一个词，中间不要停顿 · Blend 【赶快】into one smooth word" }
];

const PRAISES = [
  { min:90, msgs:["🏆 完美！声调拿捏精准！Perfect tones!", "🌟 太棒了，说得非常地道！So natural!"] },
  { min:75, msgs:["🔥 非常好，再练一遍就完美！Almost perfect!", "💪 发音很稳，越来越自然了！Getting smoother!"] },
  { min:60, msgs:["👏 不错，节奏感已经到位了！Good rhythm!", "💡 有进步，多听几遍能做到！Keep it up!"] },
  { min:0,  msgs:["🌱 开口就是最大的勇气！Brave start!", "💫 每次练习都是进步！Every rep counts!"] }
];

let idx = 0;
let phase = "idle";
let segTimer = null;
let hasRecorded = false;
let sessionScores = [];

const audio = new Audio(AUDIO_SRC);
audio.preload = "auto";

function randScore() { return Math.floor(Math.random() * 14) + 85; }

function getPraise(s) {
  const b = PRAISES.find(p => s >= p.min);
  return b ? b.msgs[Math.floor(Math.random() * b.msgs.length)] : "";
}

function setStatus(t) { document.getElementById("status").textContent = t; }

function updateUI() {
  const s = SENTENCES[idx];
  document.getElementById("zh").textContent = s.zh;
  document.getElementById("pinyin").textContent = s.pinyin;
  document.getElementById("en").textContent = s.en;
  document.getElementById("badge").textContent = "第 " + (idx+1) + "/5 句";
  document.getElementById("counter").textContent = (idx+1) + " / 5";
  document.getElementById("progress").style.width = ((idx+1)/5*100) + "%";
  document.getElementById("score-panel").style.display = "none";
  document.getElementById("bdone").className = "btn btn-done";
  document.getElementById("bs").disabled = true;
  document.getElementById("bn").disabled = true;
  document.getElementById("bl").disabled = false;
  document.getElementById("bprev").disabled = idx === 0;
  phase = "idle";
  setStatus("准备好了 Ready");
}

function doPrev() {
  if (idx > 0) { idx--; updateUI(); }
}

function doListen() {
  setStatus("▶ 听原声 Listening...");
  document.getElementById("bl").classList.add("active");
  const s = SENTENCES[idx];
  audio.currentTime = s.start;
  audio.playbackRate = 1;
  audio.play();
  if (segTimer) clearTimeout(segTimer);
  const dur = (s.end - s.start) * 1000;
  segTimer = setTimeout(() => {
    audio.pause();
    document.getElementById("bl").classList.remove("active");
    document.getElementById("bs").disabled = false;
    setStatus("准备好了 Ready");
  }, dur + 200);
  phase = "listen";
}

function doSlow() {
  setStatus("🐢 慢速跟读 Shadow (slow)...");
  document.getElementById("bs").classList.add("active");
  const s = SENTENCES[idx];
  audio.currentTime = s.start;
  audio.playbackRate = 0.7;
  audio.play();
  if (segTimer) clearTimeout(segTimer);
  const dur = (s.end - s.start) / 0.7 * 1000;
  segTimer = setTimeout(() => {
    audio.pause();
    audio.playbackRate = 1;
    document.getElementById("bs").classList.remove("active");
    document.getElementById("bn").disabled = false;
    setStatus("准备好了 Ready");
  }, dur + 200);
  phase = "slow";
}

function doNormal() {
  setStatus("🚀 常速跟读 Shadow (normal)...");
  document.getElementById("bn").classList.add("active");
  const s = SENTENCES[idx];
  audio.currentTime = s.start;
  audio.playbackRate = 1;
  audio.play();
  if (segTimer) clearTimeout(segTimer);
  const dur = (s.end - s.start) * 1000;
  segTimer = setTimeout(() => {
    audio.pause();
    document.getElementById("bn").classList.remove("active");
    setStatus("录音完成 Done");
    showScore();
  }, dur + 200);
  phase = "normal";
}

function showScore() {
  const s = randScore();
  sessionScores.push(s);
  const fb = FEEDBACK[idx] || FEEDBACK[0];
  document.getElementById("score-num").textContent = s;
  document.getElementById("score-num").style.color = s >= 85 ? "#22c55e" : s >= 70 ? "#facc15" : "#f87171";
  document.getElementById("praise").textContent = fb.praise + "  " + getPraise(s);
  document.getElementById("hint").textContent = fb.hint;
  document.getElementById("score-panel").style.display = "flex";
  document.getElementById("bdone").className = "btn btn-done show";
  setStatus("✅ 完成 Done");
}

function doNext() {
  if (segTimer) clearTimeout(segTimer);
  audio.pause();
  if (idx >= SENTENCES.length - 1) {
    showCompletion();
    return;
  }
  idx++;
  phase = "idle";
  setStatus("准备好了 Ready");
  updateUI();
}

function showCompletion() {
  const overall = sessionScores.length
    ? Math.round(sessionScores.reduce((a,b)=>a+b,0)/sessionScores.length)
    : Math.floor(Math.random()*20)+72;

  const oColor = overall >= 85 ? "#22c55e" : overall >= 70 ? "#facc15" : "#f87171";
  const avgEl = document.getElementById("avg-score");
  avgEl.textContent = overall;
  avgEl.style.color = oColor;

  const grade = overall >= 90 ? "🏆 优秀 Excellent" :
                overall >= 80 ? "🌟 良好 Great" :
                overall >= 70 ? "💪 一般 Good" : "🌱 继续加油 Keep Going";
  const gradeEl = document.getElementById("score-grade");
  gradeEl.textContent = grade;
  gradeEl.style.color = oColor;

  const fb = FEEDBACK[Math.min(idx, FEEDBACK.length-1)];
  const best = PRAISES.find(p => overall >= p.min);
  const praiseMsg = best ? best.msgs[Math.floor(Math.random()*best.msgs.length)] : "";

  document.getElementById("praise-block").innerHTML =
    "<div style='font-size:15px;font-weight:600;margin-bottom:8px;'>" + praiseMsg + "</div>" +
    "<div style='font-size:13px;color:#94a3b8;'>" + fb.hint + "</div>";

  document.getElementById("overlay").classList.add("show");
  launchFireworks();
}

function restartLesson() {
  document.getElementById("overlay").classList.remove("show");
  stopFireworks();
  idx = 0;
  phase = "idle";
  sessionScores = [];
  setStatus("准备好了 Ready");
  updateUI();
}

// ── Fireworks ────────────────────────────────────────────
const fwCanvas = document.getElementById("fw-canvas");
const fwCtx = fwCanvas.getContext("2d");
let fwParticles = [];
let fwAnimId = null;
let fwStopTimer = null;
const FW_COLORS = ["#22c55e","#60a5fa","#fbbf24","#f87171","#a78bfa","#fb923c"];

function resizeFW() {
  fwCanvas.width = window.innerWidth;
  fwCanvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeFW);
resizeFW();

function burst(x, y) {
  const color = FW_COLORS[Math.floor(Math.random()*FW_COLORS.length)];
  for (let i = 0; i < 60; i++) {
    const angle = (Math.PI * 2 / 60) * i;
    const speed = 2 + Math.random() * 5;
    fwParticles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      alpha: 1,
      color,
      r: 2 + Math.random() * 2
    });
  }
}

function animateFW() {
  fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
  fwParticles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.08;
    p.alpha -= 0.015;
    fwCtx.globalAlpha = Math.max(0, p.alpha);
    fwCtx.fillStyle = p.color;
    fwCtx.beginPath();
    fwCtx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    fwCtx.fill();
  });
  fwCtx.globalAlpha = 1;
  fwParticles = fwParticles.filter(p => p.alpha > 0);
  fwAnimId = requestAnimationFrame(animateFW);
}

function launchFireworks() {
  fwParticles = [];
  if (fwAnimId) cancelAnimationFrame(fwAnimId);
  if (fwStopTimer) clearTimeout(fwStopTimer);
  animateFW();
  let count = 0;
  function fire() {
    burst(Math.random()*window.innerWidth, Math.random()*window.innerHeight*0.6);
    count++;
    if (count < 12) setTimeout(fire, 400);
  }
  fire();
  fwStopTimer = setTimeout(stopFireworks, 5000);
}

function stopFireworks() {
  if (fwAnimId) { cancelAnimationFrame(fwAnimId); fwAnimId = null; }
  fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
  fwParticles = [];
}

// ── Init ─────────────────────────────────────────────────
updateUI();
</script>
</body>
</html>
